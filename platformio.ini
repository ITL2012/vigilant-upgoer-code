; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
;
; ESP32-S3 N16R8: 16MB Flash + 8MB PSRAM
; Force PSRAM enable and override hardware config
;
board_build.mcu = esp32s3
board_build.variant = esp32s3
board_build.psram = enable
board_build.psram_size = 8MB
board_build.flash_mode = qio
board_build.flash_size = 16MB
;
; Explicitly enable PSRAM in the SDK
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_SPIRAM_USE_MALLOC=1
    -DCONFIG_SPIRAM_IS_READY=1
    -DCONFIG_SPIRAM_SPEED_80M=1

; Automatically download all required libraries from the registry
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/Adafruit BNO08x @ ^1.2.5
    adafruit/Adafruit BMP5xx Library @ ^1.0.2
    adafruit/Adafruit PWM Servo Driver Library @ ^3.0.1
    dlloydev/QuickPID @ ^3.1.9
    ayushsharma82/ElegantOTA
    
